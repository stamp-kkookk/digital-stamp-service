spring:
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  security:
    user:
      name: test
      password: test
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: profile, email
            redirect-uri: "{baseUrl}/api/public/oauth2/callback/{registrationId}"
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/public/oauth2/callback/{registrationId}"
            client-authentication-method: client_secret_post
            scope: profile_nickname
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/public/oauth2/callback/{registrationId}"
            client-authentication-method: client_secret_post
            scope: name, email
        provider:
          google:
            user-name-attribute: sub
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  h2:
    console:
      enabled: false

app:
  frontend-url: http://localhost:5173
  storage:
    local-path: ${java.io.tmpdir}/kkookk-test-storage
  qr-base-url: "http://localhost:5176"

logging:
  level:
    org.hibernate.SQL: DEBUG

jwt:
  secret: test-secret-key-for-jwt-token-generation-minimum-256-bits-required-for-testing
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
  stepup-token-expiration: 600000

oauth:
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
  kakao:
    client-id: test-kakao-client-id
    client-secret: test-kakao-client-secret
  naver:
    client-id: test-naver-client-id
    client-secret: test-naver-client-secret
