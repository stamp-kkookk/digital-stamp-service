spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
            redirect-uri: "${FRONTEND_URL}/api/public/oauth2/callback/{registrationId}"
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "${FRONTEND_URL}/api/public/oauth2/callback/{registrationId}"
            client-authentication-method: client_secret_post
            scope: profile_nickname
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "${FRONTEND_URL}/api/public/oauth2/callback/{registrationId}"
            client-authentication-method: client_secret_post
            scope: name, email
        provider:
          google:
            user-name-attribute: sub
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

logging:
  level:
    root: INFO
    com.project.kkookk: INFO

app:
  frontend-url: ${FRONTEND_URL}
  qr-base-url: ${QR_BASE_URL}
  storage:
    local-path: ${STORAGE_PATH:/data/storage}
    s3-bucket: ${S3_BUCKET:}
    s3-region: ${S3_REGION:ap-northeast-2}
    cloud-front-domain: ${CLOUDFRONT_DOMAIN:}
  image:
    max-width: 800
    max-height: 800
    quality: 0.8
    thumbnail-width: 200
    thumbnail-height: 200
    thumbnail-quality: 0.7

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
  stepup-token-expiration: ${JWT_STEPUP_TOKEN_EXPIRATION:600000}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
