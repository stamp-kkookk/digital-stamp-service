name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # 자동 리뷰 (PR events) - 읽기 + 코멘트만
  claude-review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Delete Previous Claude Reviews
        if: github.event.action == 'synchronize'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          echo "이전 Claude 리뷰 검색 중..."

          # 1) PR Conversation 코멘트(요약) 삭제 - Claude 코멘트만 필터링(필요시 기준 문자열 조정)
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | test("Claude")) | .id' \
            | while read comment_id; do
                if [ -n "$comment_id" ]; then
                  echo "PR 코멘트 삭제: $comment_id"
                  gh api -X DELETE "repos/$REPO/issues/comments/$comment_id" 2>/dev/null || true
                  sleep 0.3
                fi
              done

          # 2) 인라인 리뷰 코멘트 삭제 (미해결 + 봇만 있는 스레드)
          OWNER=${REPO%/*}
          NAME=${REPO#*/}

          gh api graphql -F owner="$OWNER" -F name="$NAME" -F number=$PR_NUMBER -f query='
            query($owner: String!, $name: String!, $number: Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  reviewThreads(last: 100) {
                    nodes {
                      isResolved
                      comments(first: 50) {
                        nodes { databaseId author { login } }
                      }
                    }
                  }
                }
              }
            }' \
            --jq '.data.repository.pullRequest.reviewThreads.nodes[]
              | select(.isResolved == false)
              | select((.comments.nodes | length) > 0)
              | select([.comments.nodes[].author.login] | all(. == "github-actions[bot]"))
              | .comments.nodes[].databaseId' \
            | while read comment_id; do
                if [ -n "$comment_id" ]; then
                  echo "인라인 코멘트 삭제: $comment_id"
                  gh api -X DELETE "repos/$REPO/pulls/comments/$comment_id" 2>/dev/null || true
                  sleep 0.3
                fi
              done

          echo "이전 리뷰 삭제 완료"

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            이 PR을 리뷰하고 코멘트로 작성해주세요.
          claude_args: >-
            --allowedTools "Read,Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"

  # 대화형 (@claude mentions) - 코드 수정 가능
  claude-interactive:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    concurrency:
      group: claude-interactive-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true

    if: |
      github.actor != 'github-actions[bot]' &&
      (
        (github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(github.event.comment.body, '@claude') &&
          (github.event.comment.author_association == 'OWNER' ||
           github.event.comment.author_association == 'MEMBER' ||
           github.event.comment.author_association == 'COLLABORATOR')
        ) ||
        (github.event_name == 'pull_request_review_comment' &&
          contains(github.event.comment.body, '@claude') &&
          (github.event.comment.author_association == 'OWNER' ||
           github.event.comment.author_association == 'MEMBER' ||
           github.event.comment.author_association == 'COLLABORATOR')
        )
      )

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "is_cross_repo=$(gh pr view "$PR_NUMBER" -R "$REPO" --json isCrossRepository --jq .isCrossRepository)" >> "$GITHUB_OUTPUT"
          echo "head_repo=$(gh pr view "$PR_NUMBER" -R "$REPO" --json headRepository --jq .headRepository.nameWithOwner)" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(gh pr view "$PR_NUMBER" -R "$REPO" --json headRefName --jq .headRefName)" >> "$GITHUB_OUTPUT"

      - name: Stop on fork PR (safety)
        if: steps.pr.outputs.is_cross_repo == 'true'
        run: |
          echo "Fork PR에서는 보안상 수정/푸시 작업을 수행하지 않습니다."
          echo "Fork PR에서는 보안상 수정/푸시 작업을 수행하지 않습니다."
          exit 1

      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Claude Interactive
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}
            HEAD BRANCH: ${{ steps.pr.outputs.head_ref }}

            사용자가 @claude 멘션으로 코드 수정을 요청했습니다.
            반드시 다음 순서로 작업하세요:
            1. `gh pr diff` 또는 `Read`로 관련 파일을 파악하세요.
            2. `Edit`로 파일을 직접 수정하세요. 리뷰 코멘트만 남기지 마세요.
            3. `git add` → `git commit` → `git push origin HEAD:${{ steps.pr.outputs.head_ref }}`로 push하세요.
            4. `gh pr comment`로 무엇을 수정했는지 한국어로 요약하세요.
          claude_args: >-
            --allowedTools "Edit,Read,Write,Bash(git add:*),Bash(git commit:*),Bash(git push origin HEAD:*),Bash(git fetch:*),Bash(git show:*),Bash(git log:*),Bash(git diff:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),mcp__github_inline_comment__create_inline_comment"