name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 이전 봇 리뷰 스마트 클린업
      # - PR에 커밋 추가(synchronize) 시에만 동작
      # - Resolved 스레드: 보존 (수정 완료된 유의미한 기록)
      # - 사람 답글이 있는 스레드: 보존 (진행 중인 토론)
      # - 봇만 단독으로 남긴 미해결 코멘트: 삭제 (노이즈)
      - name: Delete Previous Claude Reviews
        if: github.event.action == 'synchronize'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          echo "이전 Claude 리뷰 검색 중..."

          # 1. PR 코멘트(요약) 삭제 - github-actions[bot]이 작성한 코멘트
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | .id' \
            | while read comment_id; do
                if [ -n "$comment_id" ]; then
                  echo "PR 코멘트 삭제: $comment_id"
                  gh api -X DELETE "repos/$REPO/issues/comments/$comment_id" 2>/dev/null || true
                  sleep 0.3
                fi
              done

          # 2. 인라인 리뷰 코멘트 삭제
          # - 미해결(Unresolved) + 봇만 있는 스레드만 삭제
          # - 사용자 답글이 있는 스레드는 보존
          OWNER=${REPO%/*}
          NAME=${REPO#*/}
          gh api graphql -F owner="$OWNER" -F name="$NAME" -F number=$PR_NUMBER -f query='
            query($owner: String!, $name: String!, $number: Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  reviewThreads(last: 100) {
                    nodes {
                      isResolved
                      comments(first: 50) {
                        nodes {
                          databaseId
                          author { login }
                        }
                      }
                    }
                  }
                }
              }
            }' \
            --jq '.data.repository.pullRequest.reviewThreads.nodes[]
              | select(.isResolved == false)
              | select([.comments.nodes[].author.login] | all(. == "github-actions[bot]"))
              | .comments.nodes[].databaseId' \
            | while read comment_id; do
                if [ -n "$comment_id" ]; then
                  echo "인라인 코멘트 삭제: $comment_id"
                  gh api -X DELETE "repos/$REPO/pulls/comments/$comment_id" 2>/dev/null || true
                  sleep 0.3
                fi
              done

          echo "이전 리뷰 삭제 완료"

      # Minimalist Prompting
      # - 핵심 목표만 전달, 나머지는 모델의 추론 능력에 위임
      # - CLAUDE.md가 프로젝트 컨텍스트 제공
      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
            이 PR을 리뷰하고 코멘트로 작성해주세요.
          claude_args: |
            --allowedTools "Edit,Read,Write,Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"
          trigger_phrase: "@claude"
