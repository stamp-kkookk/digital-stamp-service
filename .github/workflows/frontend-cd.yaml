name: Frontend CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-cd.yaml'

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  AWS_REGION: ap-northeast-2
  WORKING_DIRECTORY: frontend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # CloudFront same-origin: no API base URL needed
          VITE_API_BASE_URL: ""

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ "s3://${{ secrets.S3_FRONTEND_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"

          # index.html and JSON manifests: no cache (always fresh)
          aws s3 cp dist/index.html "s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

          # Copy any JSON files at root (e.g., manifest.json)
          shopt -s nullglob
          for f in dist/*.json; do
            aws s3 cp "$f" "s3://${{ secrets.S3_FRONTEND_BUCKET }}/$(basename "$f")" \
              --cache-control "no-cache, no-store, must-revalidate"
          done

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/index.html" "/assets/*"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_CI_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              --data "{
                \"text\": \"Frontend CD Failed\",
                \"blocks\": [
                  {
                    \"type\": \"header\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"Frontend Deploy Failed\", \"emoji\": true }
                  },
                  {
                    \"type\": \"section\",
                    \"text\": { \"type\": \"mrkdwn\", \"text\": \"*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${GITHUB_SHA::7}>\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\" }
                  }
                ]
              }"
          fi
