global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "10.0.10.13:9093"

scrape_configs:
  - job_name: "kkookk-backend"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 15s
    static_configs:
      - targets: ["10.0.10.42:7070"]
        labels:
          application: "kkookk"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
