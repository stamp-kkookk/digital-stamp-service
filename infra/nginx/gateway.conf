# =============================================================================
# Gateway nginx — Reverse proxy to Backend EC2 (private subnet)
# Location: /etc/nginx/sites-available/gateway on Gateway EC2
#
# After terraform apply, replace BACKEND_PRIVATE_IP with actual IP:
#   ssh kkookk-bastion
#   sudo sed -i 's/BACKEND_PRIVATE_IP/<actual_ip>/' /etc/nginx/sites-available/gateway
#   sudo nginx -t && sudo nginx -s reload
# =============================================================================

server {
    listen 80;
    server_name _;

    # Health check for CloudFront origin
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # API proxy -> Backend
    location /api/ {
        proxy_pass http://BACKEND_PRIVATE_IP:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        proxy_buffering off;
    }

    # OAuth callbacks now live under /api/public/oauth2/* (covered by /api/ above).
    # /oauth/complete is a frontend SPA route served by CloudFront → S3.
}
