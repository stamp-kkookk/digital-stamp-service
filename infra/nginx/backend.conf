# =============================================================================
# Backend nginx — Blue/Green Docker container switch
# Location: /etc/nginx/sites-available/backend on Backend EC2
#
# deploy.sh toggles between:
#   server 127.0.0.1:8081  (blue)
#   server 127.0.0.1:8082  (green)
# =============================================================================

upstream backend {
    # Active container port — managed by deploy.sh
    server 127.0.0.1:8081;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }
}
