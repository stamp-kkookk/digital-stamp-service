<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1296 832">
  <defs>
    <!-- Filled diamond icon (inner facet lines) -->
    <symbol id="dia7f" viewBox="0 0 60 60">
      <path d="M30,4 L56,30 L30,56 L4,30Z" fill="#C9A96E"/>
      <path d="M30,4 L56,30 L30,56 L4,30Z" fill="none" stroke="#E8D5A3" stroke-width="1" opacity="0.4"/>
      <path d="M15,17 L30,56 L45,17" fill="none" stroke="#1A1A1A" stroke-width="0.6" opacity="0.15"/>
      <line x1="30" y1="4" x2="30" y2="56" stroke="#1A1A1A" stroke-width="0.4" opacity="0.08"/>
    </symbol>
    <!-- Ghost diamond -->
    <symbol id="dia7g" viewBox="0 0 60 60">
      <path d="M30,4 L56,30 L30,56 L4,30Z" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.15" stroke-dasharray="3,2"/>
    </symbol>
  </defs>
  <!-- Charcoal card -->
  <rect width="1296" height="832" rx="20" fill="#1A1A1A"/>
  <!-- Gold line border -->
  <rect x="24" y="24" width="1248" height="784" rx="14" fill="none" stroke="#C9A96E" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Corner accent dots -->
  <g fill="#C9A96E" opacity="0.08">
    <circle cx="100" cy="60" r="1.5"/><circle cx="1200" cy="50" r="1.2"/>
    <circle cx="80" cy="770" r="1.5"/><circle cx="1220" cy="780" r="1.8"/>
  </g>
  <!-- Title -->
  <text x="648" y="60" text-anchor="middle" fill="#C9A96E" font-family="'Georgia', serif" font-size="26" letter-spacing="8">NOIR COLLECTION</text>
  <text x="648" y="95" text-anchor="middle" fill="#C9A96E" font-family="sans-serif" font-size="14" opacity="0.5">12번의 밤을 채우면 특별한 한 잔</text>

  <!-- TIER I label + gold divider -->
  <line x1="100" y1="135" x2="1196" y2="135" stroke="#C9A96E" stroke-opacity="0.15" stroke-width="1"/>
  <text x="100" y="130" fill="#C9A96E" font-family="'Georgia', serif" font-size="10" letter-spacing="3" opacity="0.35">TIER I</text>

  <!-- Row 0: 4 filled diamonds -->
  <use href="#dia7f" x="229" y="170" width="60" height="60"/>
  <use href="#dia7f" x="488" y="170" width="60" height="60"/>
  <use href="#dia7f" x="748" y="170" width="60" height="60"/>
  <use href="#dia7f" x="1007" y="170" width="60" height="60"/>

  <!-- TIER II label + gold divider -->
  <line x1="100" y1="310" x2="1196" y2="310" stroke="#C9A96E" stroke-opacity="0.15" stroke-width="1"/>
  <text x="100" y="305" fill="#C9A96E" font-family="'Georgia', serif" font-size="10" letter-spacing="3" opacity="0.35">TIER II</text>

  <!-- Row 1: 4 filled diamonds -->
  <use href="#dia7f" x="229" y="345" width="60" height="60"/>
  <use href="#dia7f" x="488" y="345" width="60" height="60"/>
  <use href="#dia7f" x="748" y="345" width="60" height="60"/>
  <use href="#dia7f" x="1007" y="345" width="60" height="60"/>

  <!-- TIER III label + gold divider -->
  <line x1="100" y1="485" x2="1196" y2="485" stroke="#C9A96E" stroke-opacity="0.15" stroke-width="1"/>
  <text x="100" y="480" fill="#C9A96E" font-family="'Georgia', serif" font-size="10" letter-spacing="3" opacity="0.35">TIER III</text>

  <!-- Row 2: 1 filled + 2 ghost + reward -->
  <use href="#dia7f" x="229" y="520" width="60" height="60"/>

  <!-- Ghost diamonds -->
  <use href="#dia7g" x="488" y="520" width="60" height="60"/>
  <use href="#dia7g" x="748" y="520" width="60" height="60"/>

  <!-- Reward diamond -->
  <g transform="translate(1037, 550)">
    <path d="M0,-30 L30,0 L0,30 L-30,0Z" fill="#8A6D3B"/>
    <path d="M0,-30 L30,0 L0,30 L-30,0Z" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.4"/>
    <text x="0" y="-4" text-anchor="middle" fill="#1A1A1A" font-family="'Georgia', serif" font-size="9" letter-spacing="1">SPECIAL</text>
    <text x="0" y="10" text-anchor="middle" fill="#1A1A1A" font-family="'Georgia', serif" font-size="11" font-weight="700">DRINK</text>
  </g>

  <!-- Bottom gold accent line -->
  <line x1="100" y1="680" x2="1196" y2="680" stroke="#C9A96E" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Footer -->
  <text x="648" y="755" text-anchor="middle" fill="#C9A96E" font-family="sans-serif" font-size="14" opacity="0.35">당신의 밤을 위한 특별한 보상</text>
</svg>