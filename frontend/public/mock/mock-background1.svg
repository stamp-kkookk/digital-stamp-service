<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 790">
  <defs>
    <filter id="noise1">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>
  <!-- Bright off-white base -->
  <rect width="1240" height="790" fill="#FAF8F4"/>
  <!-- Subtle paper grain texture -->
  <rect width="1240" height="790" filter="url(#noise1)" opacity="0.2"/>
  <!-- Minimal coffee cup outline -->
  <g transform="translate(620, 340)" fill="none" stroke="#8A8078" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cup body -->
    <path d="M-35,10 L-30,55 Q-28,65 -18,65 L18,65 Q28,65 30,55 L35,10"/>
    <!-- Cup rim -->
    <ellipse cx="0" cy="10" rx="35" ry="8"/>
    <!-- Handle -->
    <path d="M35,22 Q52,22 52,38 Q52,52 35,52"/>
    <!-- Steam lines -->
    <path d="M-8,-12 Q-12,-28 -4,-38" stroke-width="1.5" opacity="0.35"/>
    <path d="M6,-15 Q2,-32 10,-42" stroke-width="1.5" opacity="0.35"/>
  </g>
  <!-- Terracotta accent dot -->
  <circle cx="620" cy="430" r="4" fill="#C4734F"/>
  <!-- Brand name - large typography -->
  <text x="620" y="560" text-anchor="middle" fill="#4A4540" font-family="'Georgia', serif" font-size="72" font-weight="700" letter-spacing="18">HAZE</text>
  <!-- Subtitle -->
  <text x="620" y="600" text-anchor="middle" fill="#C4734F" font-family="'Georgia', serif" font-size="16" letter-spacing="6">SPECIALTY COFFEE</text>
</svg>
