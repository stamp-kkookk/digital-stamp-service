<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 790">
  <!-- Pure white base - no noise for clean pop look -->
  <rect width="1240" height="790" fill="#FFFFFF"/>
  <!-- Cloud/bubble dot pattern -->
  <g fill="#FF6B6B" opacity="0.1">
    <circle cx="150" cy="120" r="25"/><circle cx="200" cy="100" r="18"/>
    <circle cx="1050" cy="150" r="22"/><circle cx="1100" cy="130" r="15"/>
    <circle cx="180" cy="650" r="20"/><circle cx="1060" cy="680" r="18"/>
    <circle cx="400" cy="80" r="12"/><circle cx="850" cy="700" r="14"/>
  </g>
  <!-- Big bold PUFF! typography -->
  <text x="620" y="420" text-anchor="middle" fill="#FF6B6B" font-family="'Arial Black', 'Helvetica', sans-serif" font-size="160" font-weight="900" letter-spacing="-4">PUFF!</text>
  <!-- Small cloud icons around text -->
  <g fill="#FF6B6B" opacity="0.18">
    <!-- Cloud 1 -->
    <circle cx="250" cy="340" r="15"/><circle cx="270" cy="330" r="20"/><circle cx="295" cy="340" r="15"/>
    <!-- Cloud 2 -->
    <circle cx="920" cy="360" r="12"/><circle cx="938" cy="352" r="16"/><circle cx="958" cy="360" r="12"/>
    <!-- Cloud 3 -->
    <circle cx="480" cy="480" r="10"/><circle cx="495" cy="474" r="13"/><circle cx="512" cy="480" r="10"/>
  </g>
  <!-- Subtitle -->
  <text x="620" y="500" text-anchor="middle" fill="#FF6B6B" font-family="sans-serif" font-size="16" letter-spacing="10" opacity="0.7">DESSERT BAR</text>
</svg>
