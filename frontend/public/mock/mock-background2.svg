    <path d="M0,-18 L0,-35" stroke="#D4A060" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M35,-15 L25,-28" stroke="#D4A060" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
