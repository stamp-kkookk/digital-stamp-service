<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1296 832">
  <defs>
    <!-- Filled stepping stone -->
    <symbol id="stone2f" viewBox="0 0 70 55">
      <ellipse cx="35" cy="27.5" rx="33" ry="25" fill="#8B9D83" stroke="#5A7A52" stroke-width="1" stroke-opacity="0.3"/>
      <!-- Leaf veins on stone -->
      <path d="M25,22 Q35,18 45,22" fill="none" stroke="white" stroke-width="0.8" opacity="0.4"/>
      <path d="M28,30 Q35,26 42,30" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>
    </symbol>
    <!-- Ghost stepping stone -->
    <symbol id="stone2g" viewBox="0 0 70 55">
      <ellipse cx="35" cy="27.5" rx="33" ry="25" fill="none" stroke="#8B9D83" stroke-width="1.2" opacity="0.2" stroke-dasharray="4,3"/>
    </symbol>
    <!-- Small leaf decoration -->
    <symbol id="leafdeco" viewBox="0 0 16 20">
      <path d="M8,18 Q7,10 8,4 Q4,2 2,6 Q4,10 8,10" fill="#8B9D83" opacity="0.3"/>
      <path d="M8,18 Q9,10 8,4 Q12,2 14,6 Q12,10 8,10" fill="#5A7A52" opacity="0.2"/>
    </symbol>
  </defs>
  <!-- Sage green light card -->
  <rect width="1296" height="832" rx="20" fill="#E8EDE5"/>
  <rect x="24" y="24" width="1248" height="784" rx="14" fill="none" stroke="#8B9D83" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Title -->
  <text x="648" y="60" text-anchor="middle" fill="#5A7A52" font-family="'Georgia', serif" font-size="22" letter-spacing="6">한 잔의 여유</text>
  <text x="648" y="95" text-anchor="middle" fill="#8B9D83" font-family="sans-serif" font-size="15" opacity="0.7">8잔의 차를 마시면 특별한 한 잔을 선물해요</text>

  <!-- S-curve dotted vine path connecting the stones -->
  <path d="M200,210 C350,210 350,320 500,320 C650,320 650,430 800,430 C950,430 950,540 1100,540"
        fill="none" stroke="#8B9D83" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Small leaf decorations along the path -->
  <use href="#leafdeco" x="280" y="195" width="14" height="18" transform="rotate(-15, 287, 204)"/>
  <use href="#leafdeco" x="420" y="305" width="14" height="18" transform="rotate(10, 427, 314)"/>
  <use href="#leafdeco" x="580" y="310" width="14" height="18" transform="rotate(-20, 587, 319)"/>
  <use href="#leafdeco" x="720" y="415" width="14" height="18" transform="rotate(5, 727, 424)"/>
  <use href="#leafdeco" x="870" y="425" width="14" height="18" transform="rotate(-10, 877, 434)"/>
  <use href="#leafdeco" x="1010" y="525" width="14" height="18" transform="rotate(15, 1017, 534)"/>

  <!-- Extra scattered leaves -->
  <use href="#leafdeco" x="340" y="250" width="11" height="14" opacity="0.5" transform="rotate(30, 345, 257)"/>
  <use href="#leafdeco" x="650" y="360" width="11" height="14" opacity="0.5" transform="rotate(-25, 655, 367)"/>
  <use href="#leafdeco" x="950" y="470" width="11" height="14" opacity="0.5" transform="rotate(20, 955, 477)"/>

  <!-- Stone 1 (filled) - start of path -->
  <use href="#stone2f" x="165" y="185" width="70" height="55"/>
  <!-- Stone 2 (filled) -->
  <use href="#stone2f" x="310" y="245" width="70" height="55"/>
  <!-- Stone 3 (filled) -->
  <use href="#stone2f" x="465" y="295" width="70" height="55"/>
  <!-- Stone 4 (filled) -->
  <use href="#stone2f" x="590" y="355" width="70" height="55"/>
  <!-- Stone 5 (filled) -->
  <use href="#stone2f" x="730" y="395" width="70" height="55"/>
  <!-- Stone 6 (filled) -->
  <use href="#stone2f" x="850" y="455" width="70" height="55"/>
  <!-- Stone 7 (ghost) -->
  <use href="#stone2g" x="970" y="495" width="70" height="55"/>

  <!-- Reward stone (special) -->
  <g transform="translate(1100, 540)">
    <ellipse rx="38" ry="30" fill="#5A7A52" stroke="#3D5C35" stroke-width="1" stroke-opacity="0.3"/>
    <text x="0" y="-4" text-anchor="middle" fill="#E8EDE5" font-family="'Georgia', serif" font-size="11" letter-spacing="1">특별한</text>
    <text x="0" y="12" text-anchor="middle" fill="#FFF8F0" font-family="'Georgia', serif" font-size="13" font-weight="700">한 잔</text>
  </g>

  <!-- Footer -->
  <text x="648" y="760" text-anchor="middle" fill="#5A7A52" font-family="sans-serif" font-size="15" opacity="0.4">소요에서 보내는 조용한 시간</text>
</svg>