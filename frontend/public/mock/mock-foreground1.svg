<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1296 832">
  <defs>
    <symbol id="cup1" viewBox="0 0 28 28">
      <path d="M7,10 L7,21 Q7,23.5 9.5,23.5 L16.5,23.5 Q19,23.5 19,21 L19,10" fill="none" stroke="white" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M19,13.5 Q22,13.5 22,16 Q22,18.5 19,18" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M11,8 Q12,5 13,8" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
      <path d="M15,7 Q16,4 17,7" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    </symbol>
    <symbol id="cup1g" viewBox="0 0 28 28">
      <path d="M7,10 L7,21 Q7,23.5 9.5,23.5 L16.5,23.5 Q19,23.5 19,21 L19,10" fill="none" stroke="#C4734F" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" opacity="0.25"/>
      <path d="M19,13.5 Q22,13.5 22,16 Q22,18.5 19,18" fill="none" stroke="#C4734F" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
    </symbol>
  </defs>
  <!-- Off-white card -->
  <rect width="1296" height="832" rx="20" fill="#F5F2ED"/>
  <!-- Thin border -->
  <rect x="24" y="24" width="1248" height="784" rx="14" fill="none" stroke="#2D2D2D" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Title -->
  <text x="648" y="60" text-anchor="middle" fill="#2D2D2D" font-family="'Georgia', serif" font-size="24" letter-spacing="8">YOUR COFFEE JOURNEY</text>
  <text x="648" y="95" text-anchor="middle" fill="#C4734F" font-family="sans-serif" font-size="16" opacity="0.7">10잔의 여정, 마지막엔 한 잔의 선물</text>
  <!-- Row 0: 5 filled -->
  <circle cx="216" cy="270" r="52" fill="#C4734F"/><use href="#cup1" x="202" y="256" width="28" height="28"/>
  <circle cx="432" cy="270" r="52" fill="#C4734F"/><use href="#cup1" x="418" y="256" width="28" height="28"/>
  <circle cx="648" cy="270" r="52" fill="#C4734F"/><use href="#cup1" x="634" y="256" width="28" height="28"/>
  <circle cx="864" cy="270" r="52" fill="#C4734F"/><use href="#cup1" x="850" y="256" width="28" height="28"/>
  <circle cx="1080" cy="270" r="52" fill="#C4734F"/><use href="#cup1" x="1066" y="256" width="28" height="28"/>
  <!-- Horizontal divider between rows -->
  <line x1="180" y1="395" x2="1116" y2="395" stroke="#2D2D2D" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Diamond accent at center of divider -->
  <g transform="translate(648, 395) rotate(45)" fill="none" stroke="#C4734F" stroke-opacity="0.3" stroke-width="1">
    <rect x="-5" y="-5" width="10" height="10"/>
  </g>
  <!-- Small diamond accents at divider ends -->
  <g transform="translate(180, 395) rotate(45)" fill="#C4734F" fill-opacity="0.15">
    <rect x="-3" y="-3" width="6" height="6"/>
  </g>
  <g transform="translate(1116, 395) rotate(45)" fill="#C4734F" fill-opacity="0.15">
    <rect x="-3" y="-3" width="6" height="6"/>
  </g>
  <!-- Row 1: 3 filled + 1 ghost + reward -->
  <circle cx="216" cy="520" r="52" fill="#C4734F"/><use href="#cup1" x="202" y="506" width="28" height="28"/>
  <circle cx="432" cy="520" r="52" fill="#C4734F"/><use href="#cup1" x="418" y="506" width="28" height="28"/>
  <circle cx="648" cy="520" r="52" fill="#C4734F"/><use href="#cup1" x="634" y="506" width="28" height="28"/>
  <!-- Ghost slot -->
  <circle cx="864" cy="520" r="52" fill="none" stroke="#C4734F" stroke-opacity="0.15" stroke-width="1.5"/>
  <use href="#cup1g" x="850" y="506" width="28" height="28"/>
  <!-- Reward -->
  <circle cx="1080" cy="520" r="52" fill="#2D2D2D"/>
  <text x="1080" y="515" text-anchor="middle" fill="#F5F2ED" font-family="'Georgia', serif" font-size="12" letter-spacing="2">ON THE</text>
  <text x="1080" y="535" text-anchor="middle" fill="#C4734F" font-family="'Georgia', serif" font-size="14" font-weight="700">HOUSE</text>
  <!-- Footer -->
  <text x="648" y="760" text-anchor="middle" fill="#2D2D2D" font-family="sans-serif" font-size="15" opacity="0.4">10잔을 채우면 다음 한 잔은 저희가 드릴게요</text>
</svg>