<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 790">
  <rect width="1240" height="790" fill="#8C2F2F"/>
  <!-- Traditional border frame -->
  <rect x="40" y="40" width="1160" height="710" rx="4" fill="none" stroke="#D4A373" stroke-width="2" stroke-opacity="0.15"/>
  <rect x="52" y="52" width="1136" height="686" rx="2" fill="none" stroke="#D4A373" stroke-width="1" stroke-opacity="0.08"/>
  <!-- Corner ornaments -->
  <g fill="#D4A373" opacity="0.12">
    <circle cx="40" cy="40" r="8"/><circle cx="1200" cy="40" r="8"/>
    <circle cx="40" cy="750" r="8"/><circle cx="1200" cy="750" r="8"/>
  </g>
  <!-- Glow -->
  <circle cx="620" cy="380" r="150" fill="#D4A373" opacity="0.06"/>
  <!-- Traditional Korean sweet (약과/한과) -->
  <g transform="translate(620, 370) scale(2)">
    <!-- Base shape - flower/cookie form -->
    <circle cx="0" cy="0" r="40" fill="#D4A373"/>
    <!-- Inner pattern - traditional flower -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="#C09060" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#C09060" stroke-width="1"/>
    <!-- Petal impressions -->
    <circle cx="0" cy="-25" r="10" fill="#C09060" opacity="0.4"/>
    <circle cx="24" cy="-8" r="10" fill="#C09060" opacity="0.4"/>
    <circle cx="15" cy="20" r="10" fill="#C09060" opacity="0.4"/>
    <circle cx="-15" cy="20" r="10" fill="#C09060" opacity="0.4"/>
    <circle cx="-24" cy="-8" r="10" fill="#C09060" opacity="0.4"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="8" fill="#E8C888"/>
    <!-- Honey glaze highlight -->
    <path d="M-20,-30 Q-10,-35 0,-28 Q10,-35 20,-30" fill="#F0D8A8" opacity="0.3"/>
  </g>
  <!-- Small decorative flowers -->
  <g fill="#D4A373" opacity="0.1">
    <circle cx="200" cy="200" r="15"/><circle cx="200" cy="185" r="6"/><circle cx="215" cy="196" r="6"/><circle cx="209" cy="212" r="6"/><circle cx="191" cy="212" r="6"/><circle cx="185" cy="196" r="6"/>
    <circle cx="1040" cy="600" r="15"/><circle cx="1040" cy="585" r="6"/><circle cx="1055" cy="596" r="6"/><circle cx="1049" cy="612" r="6"/><circle cx="1031" cy="612" r="6"/><circle cx="1025" cy="596" r="6"/>
  </g>
</svg>
