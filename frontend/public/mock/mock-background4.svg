<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 790">
  <rect width="1240" height="790" fill="#9B7EC8"/>
  <!-- Clouds -->
  <g fill="white" opacity="0.08">
    <circle cx="200" cy="180" r="50"/><circle cx="250" cy="170" r="60"/><circle cx="310" cy="185" r="45"/>
    <circle cx="900" cy="550" r="40"/><circle cx="945" cy="540" r="52"/><circle cx="990" cy="555" r="38"/>
    <circle cx="1050" cy="130" r="35"/><circle cx="1085" cy="120" r="42"/><circle cx="1120" cy="135" r="30"/>
  </g>
  <!-- Sparkle dots -->
